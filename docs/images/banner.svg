<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">LLVM IR Analysis and Optimization Pass Lab</title>
  <desc id="desc">A compiler pipeline illustration from C and C++ source through Clang, LLVM IR passes, and x86-64 or AArch64 code generation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1400" height="420" rx="28" fill="url(#bg)"/>
  <text x="700" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f9fafb">LLVM IR Analysis &amp; Optimization Pass Lab</text>
  <text x="700" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1">C++17 · New Pass Manager · lit/FileCheck · x86-64 · AArch64</text>

  <g font-family="Arial, sans-serif" font-size="20" text-anchor="middle">
    <rect x="85" y="205" width="210" height="92" rx="16" fill="#0f766e"/>
    <text x="190" y="244" fill="#ffffff" font-weight="700">C / C++</text>
    <text x="190" y="272" fill="#ccfbf1">source</text>

    <rect x="365" y="205" width="210" height="92" rx="16" fill="#1d4ed8"/>
    <text x="470" y="244" fill="#ffffff" font-weight="700">Clang</text>
    <text x="470" y="272" fill="#dbeafe">frontend</text>

    <rect x="645" y="185" width="250" height="132" rx="16" fill="#7c3aed"/>
    <text x="770" y="226" fill="#ffffff" font-weight="700">LLVM IR</text>
    <text x="770" y="256" fill="#ede9fe">function metrics</text>
    <text x="770" y="284" fill="#ede9fe">safe strength reduction</text>

    <rect x="965" y="205" width="160" height="92" rx="16" fill="#b45309"/>
    <text x="1045" y="244" fill="#ffffff" font-weight="700">x86-64</text>
    <text x="1045" y="272" fill="#ffedd5">assembly</text>

    <rect x="1165" y="205" width="160" height="92" rx="16" fill="#be123c"/>
    <text x="1245" y="244" fill="#ffffff" font-weight="700">AArch64</text>
    <text x="1245" y="272" fill="#ffe4e6">assembly</text>
  </g>

  <g stroke="#93c5fd" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M295 251 H350"/>
    <path d="M575 251 H630"/>
    <path d="M895 235 H950"/>
    <path d="M895 270 C940 330 1120 330 1155 270"/>
  </g>

  <text x="700" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Portfolio project for compiler engineering fundamentals, correctness, testing, and secure development practices</text>
</svg>
