<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="510" viewBox="0 0 1400 510" role="img" aria-labelledby="title desc">
  <title id="title">Safe strength reduction</title>
  <desc id="desc">Before and after LLVM IR showing multiplication by eight replaced with a left shift by three, plus conditions that are deliberately skipped.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1400" height="510" rx="24" fill="#0f172a"/>
  <text x="700" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#f8fafc">Conservative integer strength reduction</text>

  <g font-family="monospace">
    <rect x="80" y="115" width="480" height="180" rx="16" fill="#1e293b" stroke="#f97316" stroke-width="3"/>
    <text x="110" y="153" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#fed7aa">Before</text>
    <text x="110" y="205" font-size="24" fill="#e2e8f0">%product = mul i32 %value, 8</text>
    <text x="110" y="250" font-size="20" fill="#94a3b8">modulo 2³² arithmetic</text>

    <rect x="840" y="115" width="480" height="180" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
    <text x="870" y="153" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#bbf7d0">After</text>
    <text x="870" y="205" font-size="24" fill="#e2e8f0">%product = shl i32 %value, 3</text>
    <text x="870" y="250" font-size="20" fill="#94a3b8">same fixed-width bit result</text>
  </g>

  <path d="M580 205 H820" stroke="#93c5fd" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#bfdbfe">single-bit constant</text>
  <text x="700" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#93c5fd">log₂(8) = 3</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="350" width="1240" height="105" rx="16" fill="#111827" stroke="#64748b" stroke-width="2"/>
    <text x="110" y="385" font-size="20" font-weight="700" fill="#f8fafc">Deliberately skipped:</text>
    <text x="110" y="420" font-size="18" fill="#cbd5e1">vectors · factors with multiple set bits · identity factor 1 · constant-only expressions · mul with nuw/nsw poison-generating flags</text>
  </g>
</svg>
